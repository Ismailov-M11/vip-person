<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VIP Person — App</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0C0B0A; --bg-2: #141210; --surface: #1A1714; --surface-2: #221E19;
    --line: rgba(245,238,225,0.09); --line-strong: rgba(245,238,225,0.15);
    --text: #F4EFE6; --text-2: #B6AEA0; --text-3: #807769;
    --accent: #E86A3A; --accent-soft: rgba(232,106,58,0.14);
    --gold: #E0B65C; --gold-soft: rgba(224,182,92,0.13); --gold-line: rgba(224,182,92,0.25);
    --success: #5BBF8A;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: #F0E2CC; overflow: hidden; }
  body {
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    color: var(--text); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  #root { height: 100%; }
  button { font-family: 'Hanken Grotesk', system-ui, sans-serif; }

  /* hide scrollbars but keep scroll */
  .vp-scroll, .vp-scroll * { scrollbar-width: none; }
  .vp-scroll::-webkit-scrollbar { display: none; width: 0; height: 0; }
  [class*="vp-"]::-webkit-scrollbar { display: none; }
  div { scrollbar-width: none; }
  div::-webkit-scrollbar { display: none; }

  /* form controls */
  .vp-input, .vp-textarea {
    width: 100%; background: var(--surface); border: none; outline: none;
    box-shadow: inset 0 0 0 1px var(--line); border-radius: 13px; padding: 14px 15px;
    color: var(--text); font-family: 'Hanken Grotesk', sans-serif; font-size: 15px; font-weight: 600;
    transition: box-shadow .15s;
  }
  .vp-textarea { min-height: 92px; resize: none; line-height: 1.45; }
  .vp-input::placeholder, .vp-textarea::placeholder { color: var(--text-3); font-weight: 500; }
  .vp-input:focus, .vp-textarea:focus { box-shadow: inset 0 0 0 1.5px var(--accent); }

  /* range */
  .vp-range { -webkit-appearance: none; appearance: none; height: 8px; border-radius: 5px; background: var(--surface-2); outline: none; }
  .vp-range::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%;
    background: linear-gradient(135deg, #E9C672, #D2A341); cursor: pointer;
    box-shadow: 0 3px 10px rgba(210,163,65,0.4), 0 0 0 4px rgba(224,182,92,0.18);
  }
  .vp-range::-moz-range-thumb { width: 26px; height: 26px; border: none; border-radius: 50%; background: #E0B65C; cursor: pointer; }

  @keyframes vpFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes vpSlideUp { from { transform: translateY(40px); } to { transform: translateY(0); } }
  @keyframes vpToast { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes vpScreen { from { transform: translateY(9px); } to { transform: translateY(0); } }
  @keyframes vpScan { 0% { top: 18px; } 100% { top: 230px; } }
  .vp-scanline { animation: vpScan 2s ease-in-out infinite alternate; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="app/data.js"></script>
<script type="text/babel" src="frames/ios-frame.jsx"></script>
<script type="text/babel" src="app/ui.jsx"></script>
<script type="text/babel" src="app/components.jsx"></script>
<script type="text/babel" src="app/screens-shared.jsx"></script>
<script type="text/babel" src="app/screens-blogger.jsx"></script>
<script type="text/babel" src="app/screens-business.jsx"></script>
<script type="text/babel" src="app/screens-business2.jsx"></script>
<script type="text/babel" src="app/app.jsx"></script>
</body>
</html>
